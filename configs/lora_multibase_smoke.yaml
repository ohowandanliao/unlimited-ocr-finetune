# multi_base 管线冒烟：确认 multi_base 能训通（forward 已在 eval_forward 验过）。
# 数据用 make_multipage 把现有单页拼成 2 页 multi_base 样本（<PAGE> 分隔，仅打通路径用；
# 真正的"多页→合并 markdown"数据是 P2 的 arXiv 连续文档，不是这个拼页）。
train_mode: lora_decoder
mode: multi_base                                   # 覆盖 jsonl 里的 mode，统一走 multi_base
train_jsonl: data/olmocr_train_v1/train_multi.jsonl   # make_multipage 的输出
output_dir: outputs/lora_multibase_smoke

rswa_train: true
rswa_window: 128

gpu: "0"
seed: 0
batch_size: 1
grad_accum: 2
max_steps: 40                                      # 冒烟，够确认能训即可
warmup_steps: 5
lr: 1.0e-4
max_grad_norm: 1.0
save_every: 0                                      # 只在结束存一次，不要中间 6-7G 检查点

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

gradient_checkpointing: true
