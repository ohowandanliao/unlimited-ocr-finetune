# 首次真训练（规模/管线验证 + 单页 warm-up）：lora_decoder，800 页真实 olmOCR。
# 150 optim 步 × grad_accum 2 ≈ 300 样本；warmup+cosine；每 50 步存 checkpoint。
train_mode: lora_decoder
mode: single_gundam
train_jsonl: data/olmocr_train_v1/train.jsonl
output_dir: outputs/lora_decoder_olmocr_v1

gpu: "0"
seed: 0
batch_size: 1
grad_accum: 2
max_steps: 150
warmup_steps: 15
lr: 1.0e-4
max_grad_norm: 1.0
save_every: 50

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

gradient_checkpointing: true
