# 打通验证：multi_base + R-SWA 训练一起跑。20 步 smoke。
# 数据是拼页的（非能力数据），只为证明多页 R-SWA 训练路径端到端可跑。
train_mode: lora_decoder
mode: multi_base
train_jsonl: data/olmocr_train_v1/train_multi.jsonl
output_dir: outputs/multibase_rswa_smoke

rswa_train: true
rswa_window: 128

gpu: "0"
seed: 0
batch_size: 1
grad_accum: 1
max_steps: 20
warmup_steps: 5
lr: 1.0e-4
max_grad_norm: 1.0
save_every: 0

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

gradient_checkpointing: true
